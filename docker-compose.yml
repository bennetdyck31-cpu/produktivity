services:
  # ─────────────────────────────
  # Frontend (Vite)
  # ─────────────────────────────
  frontend:
    build: ./taskgrid
    container_name: taskgrid_frontend
    restart: unless-stopped
    ports:
      - "1000:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with hot reload on Windows volumes
    volumes:
      - ./taskgrid:/app
      - /app/node_modules
    depends_on:
      - backend

  # ─────────────────────────────
  # PostgreSQL Datenbank
  # ─────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskgrid_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskgrid
      POSTGRES_USER: taskgrid_user
      POSTGRES_PASSWORD: taskgrid_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ─────────────────────────────
  # Node.js / Express Backend API
  # ─────────────────────────────
  backend:
    build: ./backend
    container_name: taskgrid_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://taskgrid_user:taskgrid_pass@db:5432/taskgrid
      PORT: 3001
    depends_on:
      - db

volumes:
  db_data:
